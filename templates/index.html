<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local People Power Map</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Local People Power Map</h1>
    <p class="subtitle">Describe your goal and we'll map out the people, places, and businesses to make it happen.</p>

    <div class="search-box">
        <textarea id="goal" placeholder="Example: I want to host a community cookout in my neighborhood this summer..." rows="3"></textarea>
        <button onclick="planEvent()">Build My Plan</button>
    </div>

    <div id="results" style="display:none;">

        <section>
            <h2>Matched Resources</h2>
            <div id="resource-cards" class="card-grid"></div>
        </section>

        <section>
            <h2>Event Checklist</h2>
            <ul id="checklist"></ul>
        </section>

        <section>
            <h2>Execution Flowchart</h2>
            <div id="flowchart" class="mermaid"></div>
        </section>

    </div>

    <div class="nav-links">
        <a href="/resources">View &amp; Manage Repository</a>
    </div>
</div>

<script>
function buildCard(r) {
    const d = r.details || {};
    let html = `<div class="card ${r.type}">
        <span class="badge">${r.type}</span>
        <h3>${r.name}</h3>
        <p class="description">${r.description}</p>`;

    if (r.address) html += `<p class="meta"><span class="meta-label">Address:</span> ${r.address}</p>`;
    if (r.email)   html += `<p class="meta"><span class="meta-label">Email:</span> ${r.email}</p>`;
    if (r.phone)   html += `<p class="meta"><span class="meta-label">Phone:</span> ${r.phone}</p>`;
    if (r.website) html += `<p class="meta"><span class="meta-label">Web:</span> ${r.website}</p>`;

    if (r.type === "person") {
        if (d.hometown)    html += `<p class="meta"><span class="meta-label">Hometown:</span> ${d.hometown}</p>`;
        if (d.availability) html += `<p class="meta"><span class="meta-label">Availability:</span> ${d.availability}</p>`;
        if (d.organizations?.length) html += tagGroup("Organizations", d.organizations, "org");
        if (d.affiliations?.length)  html += tagGroup("Affiliations", d.affiliations, "affil");
        if (d.skills?.length)        html += tagGroup("Skills", d.skills, "skill");
    }

    if (r.type === "business") {
        if (d.cost)     html += `<p class="meta"><span class="meta-label">Cost:</span> ${d.cost}</p>`;
        if (d.capacity) html += `<p class="meta"><span class="meta-label">Capacity:</span> ${d.capacity}</p>`;
        if (d.hours)    html += `<p class="meta"><span class="meta-label">Hours:</span> ${d.hours}</p>`;
        if (d.parking)  html += `<p class="meta"><span class="meta-label">Parking:</span> ${d.parking}</p>`;
        if (d.services?.length) html += tagGroup("Services", d.services, "service");
    }

    if (r.type === "location") {
        if (d.capacity)       html += `<p class="meta"><span class="meta-label">Capacity:</span> ${d.capacity}</p>`;
        if (d.indoor_outdoor) html += `<p class="meta"><span class="meta-label">Type:</span> ${d.indoor_outdoor}</p>`;
        if (d.rental_cost)    html += `<p class="meta"><span class="meta-label">Rental Cost:</span> ${d.rental_cost}</p>`;
        if (d.permit_required) html += `<p class="meta"><span class="meta-label">Permit:</span> ${d.permit_required}</p>`;
        if (d.parking)        html += `<p class="meta"><span class="meta-label">Parking:</span> ${d.parking}</p>`;
        if (d.amenities?.length) html += tagGroup("Amenities", d.amenities, "amenity");
    }

    if (r.notes) html += `<p class="meta notes">${r.notes}</p>`;

    if (r.tag_list?.length) html += tagGroup("Tags", r.tag_list, "");

    html += `</div>`;
    return html;
}

function tagGroup(label, tags, cls) {
    return `<div class="tag-group">
        <span class="tag-group-label">${label}</span>
        ${tags.map(t => `<span class="tag-chip-display ${cls}">${t}</span>`).join("")}
    </div>`;
}

async function planEvent() {
    const goal = document.getElementById("goal").value.trim();
    if (!goal) { alert("Please enter a goal first."); return; }

    const formData = new FormData();
    formData.append("goal", goal);

    const response = await fetch("/plan", { method: "POST", body: formData });
    const data = await response.json();

    if (data.error) { alert(data.error); return; }

    const cardGrid = document.getElementById("resource-cards");
    if (data.resources.length === 0) {
        cardGrid.innerHTML = "<p>No matching resources found. Try adding some to your repository.</p>";
    } else {
        cardGrid.innerHTML = data.resources.map(buildCard).join("");
    }

    const checklist = document.getElementById("checklist");
    checklist.innerHTML = data.checklist
        .map(item => `<li><input type="checkbox"> ${item}</li>`)
        .join("");

    const flowchartDiv = document.getElementById("flowchart");
    flowchartDiv.removeAttribute("data-processed");
    flowchartDiv.textContent = data.flowchart;
    mermaid.init(undefined, flowchartDiv);

    document.getElementById("results").style.display = "block";
}
</script>
</body>
</html>
